# Explicitly use only the Node.js provider
providers = ["node"]

[variables]
NIXPACKS_METADATA = "nextjs,pnpm"
NODE_ENV = "production"
PNPM_VERSION = "10.4.1"

[phases.setup]
nixPkgs = ["nodejs_24", "pnpm", "git", "vips"]

[phases.install]
dependsOn = ["setup"]
cmds = [
  "pnpm install --frozen-lockfile"
]

[phases.build]
dependsOn = ["install"]
cmds = [
  "pnpm run build"
]

[start]
cmd = "pnpm --filter sbcalc-web start"
